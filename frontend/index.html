<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley AI Assistant</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-icon">🐔</div>
            <div class="header-text">
                <h1>Stardew Assistant</h1>
                <p>Powered by AI & Junimo Magic</p>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-box" id="chatBox">
            <div class="message system-message">
                Welcome to Stardew Valley! Ask me anything about crops, villagers, or items.
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <input type="text" id="userInput" placeholder="Ask a question... (e.g. What does Abigail love?)" autocomplete="off" />
            <button id="sendBtn" class="send-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </footer>
    </div>

    <!-- Loading Animation -->
    <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
